  line-deactive: "&7- &9/lad deactivate &7- &fdisable the active model."
  line-check: "&7- &9/lad check <player> [history] &7- &fcheck suspicion or view alert history."
  line-models: "&7- &9/lad models [page] &7- &flist trained models."
  line-models-info: "&7- &9/lad models info <model> &7- &fview model details."
