  platform: "&7- &fServer: &9{server}&f, Folia: &9{folia}&f."
  detector: "&7- &fDetector: &9{detector}&f."
  model: "&7- &fActive model: &9{model}&f."
  training: "&7- &fTraining: &9{training}&f, phase: &9{phase}&f."
  recording: "&7- &fRecording: &9{recording}&f players."
  dataset: "&7- &fDataset: &9{rows}&f rows, legit &9{legit}&f, cheater &9{cheater}&f."
