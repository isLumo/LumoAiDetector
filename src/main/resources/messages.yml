  history-empty: "{prefix} &fNo alert history for &9{player}&f."
  result: "{prefix} &fPlayer &9{player}&f: suspicion &9{percent}%&f, windows &9{windows}&f, latest confidence &9{confidence}%&f, model &9{model}&f."
