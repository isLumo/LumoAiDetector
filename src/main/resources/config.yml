# LumoAiDetector 0.0.1
# Конфиг создается в plugins/LumoAiDetector/config.yml.
# Значения по умолчанию сделаны осторожными: плагин собирает чистые окна, пишет алерты и не банит автоматически.
# Автонаказания лучше включать только после своего датасета, проверки модели и тестов на сервере.

settings:
  # Включает подробные сообщения в консоль. Лучше держать false на рабочем сервере.
  debug: false

detector:
  # Главный переключатель анализа. Запись датасета через /lad record остается доступной.
  enabled: true
  # Размер скользящего окна. Под формат CSV из задания должен быть 15.
  window-size: 15
  # Игрок считается в бою, если удар или взмах рукой был не старше этого времени.
  combat-gate-ms: 1000
  # Радиус поиска живой цели.
  target-radius: 6.0
  # Максимальный угол до цели. Чем меньше, тем строже фильтр мусора.
  max-target-angle: 60.0
  # Минимальная сумма |dx| + |dy| по 15 тикам.
  movement-threshold: 15.0
  # Нормальное окно по времени между поворотами. Не стоит расширять без причины.
  dt-min-ms: 25.0
  dt-max-ms: 150.0
  # Жесткий лаг. Если dt выше этого значения, окно сразу очищается.
  hard-lag-ms: 200.0
  # Масштаб для вычисления GCD-сетки поворота. Лучше не менять.
  gcd-scale: 100000.0
  # Сколько последних дельт хранить для оценки GCD.
  gcd-history-size: 32
  # Нижний предел множителя. Защищает от огромных dx/dy при шуме float.
  gcd-min-multiplier: 0.0001
  # Запасной множитель, если GCD еще не накоплен.
  default-multiplier: 0.01
  # Жесткий предел одного шага мыши после нормализации.
  max-normalized-step: 10000.0

alert:
  # Алерты видят игроки с правом LumoAiDetector.alert.
  enabled: true
  # Писать в чат, когда подозрение выше этого процента.
  threshold-percent: 60.0
  # Антиспам для одного игрока.
  cooldown-ms: 10000
  # Показывать уверенность модели, если модель ее вернула.
  include-confidence: true

punishment:
  # По умолчанию выключено, чтобы свежая/необученная модель не наказала честного игрока.
  enabled: false
  # Процент для запуска команд наказания.
  threshold-percent: 80.0
  # Сколько последних окон хранить для решения.
  sample-size: 10
  # Сколько из последних окон должны быть классом cheater.
  required-cheat-windows: 8
  # Антиспам наказаний для одного игрока.
  cooldown-ms: 60000
  # Команды выполняются от консоли. Доступны {player}, {uuid}, {percent}, {confidence}, {model}.
  commands:
    - "kick {player} LumoAiDetector: подозрение {percent}%"
  # Если все окна в буфере дали cheater, игрок засчитывается в статистику 100%.
  mark-100-percent: true

recording:
  # Создавать заголовок dataset.csv автоматически, если файла нет.
  write-header-if-missing: true
  # Папка датасета внутри plugins/LumoAiDetector.
  dataset-path: "data/dataset.csv"

training:
  # Минимум строк для старта обучения.
  min-total-rows: 100
  # Минимум честных строк.
  min-legit-rows: 25
  # Минимум читерских строк.
  min-cheater-rows: 25
  # Процент датасета для быстрой проверки качества.
  validation-percent: 20
  # Деревья Random Forest. 100 обычно достаточно быстро и стабильно.
  random-forest-trees: 100
  # 0 означает sqrt(120). Можно указать вручную, например 10 или 11.
  random-features: 0
  # Ограничение листьев дерева, чтобы модель не раздувалась.
  max-nodes: 100
  # Минимальный размер листа дерева.
  node-size: 5
  # Как часто писать прогресс обучения администраторам.
  progress-interval-seconds: 5

models:
  # Автоматически включать новую модель после успешного обучения.
  auto-activate-after-training: true
  # Модель для автозагрузки при старте, если runtime.yml еще не создан.
  active-model: ""
  # Сколько часов хранить удаленные модели в backups.
  backup-retention-hours: 72
  # Максимум временных бекапов моделей.
  max-backups: 20

performance:
  # Период автосохранения stats.yml.
  save-stats-interval-seconds: 60
  # Максимум состояний игроков в памяти. Старые оффлайн-состояния очищаются.
  max-player-states: 500
