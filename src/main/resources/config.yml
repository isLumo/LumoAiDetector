# LumoAiDetector 0.1.2
# Config is created in plugins/LumoAiDetector/config.yml.
# Default values are conservative: the plugin collects clean windows, writes alerts, and does not auto-ban.
# Auto-punishment should only be enabled after your own dataset, model validation, and server testing.

settings:
  # Enables verbose console messages. Keep false on production servers.
  debug: false

detector:
  # Main analysis toggle. Dataset recording via /lad record remains available.
  enabled: true
  # Sliding window size. Must be 15 to match the CSV format.
  window-size: 15
  # A player is considered in combat if the last hit or swing is not older than this.
  combat-gate-ms: 1000
  # Radius for searching a living target.
  target-radius: 6.0
  # Maximum angle to the target. Smaller values filter more garbage.
  max-target-angle: 60.0
  # Minimum sum of |dx| + |dy| across 15 ticks.
  movement-threshold: 15.0
  # Normal time window between rotations. Do not widen without reason.
  dt-min-ms: 25.0
  dt-max-ms: 150.0
  # Hard lag threshold. If dt exceeds this, the window is cleared immediately.
  hard-lag-ms: 200.0
  # Scale for computing the rotation GCD grid. Better left unchanged.
  gcd-scale: 100000.0
  # How many recent deltas to store for GCD estimation.
  gcd-history-size: 32
  # Lower bound for the multiplier. Protects against huge dx/dy from float noise.
  gcd-min-multiplier: 0.0001
  # Fallback multiplier before GCD has accumulated enough data.
  default-multiplier: 0.01
  # Hard limit for one mouse step after normalization.
  max-normalized-step: 10000.0
  # Worlds where the detector is disabled. Leave empty to check everywhere.
  disabled-worlds: []
  # Players exempt from detection by UUID.
  whitelisted-uuids: []
  # Optional ping band (milliseconds). Windows are skipped when the player's ping
  # is outside [min-ping-ms, max-ping-ms], to reduce lag-driven false windows.
  # Set to -1 to disable a bound (default: both disabled). Skipped silently when
  # ping is unavailable.
  min-ping-ms: -1
  max-ping-ms: -1

alert:
  # Alerts are visible to players with the LumoAiDetector.alert permission.
  enabled: true
  # Send a chat message when suspicion is above this percent.
  threshold-percent: 60.0
  # Anti-spam cooldown per player.
  cooldown-ms: 10000
  # Show model confidence when the model returns it.
  include-confidence: true

punishment:
  # Disabled by default so a fresh or untrained model does not punish honest players.
  enabled: false
  # Percent threshold to trigger punishment commands.
  threshold-percent: 80.0
  # How many recent windows to keep for decision making.
  sample-size: 10
  # How many of the recent windows must be classified as cheater.
  required-cheat-windows: 8
  # Anti-spam cooldown for punishments per player.
  cooldown-ms: 60000
  # Commands run from the console. Available placeholders: {player}, {uuid}, {percent}, {confidence}, {model}, {world}, {ping}.
  commands:
    - "kick {player} LumoAiDetector: suspicion {percent}%"
  # If all windows in the buffer are cheater, the player is counted as 100% in statistics.
  mark-100-percent: true
  # Send a warning to the player when punishment triggers.
  notify-player: false
  notify-player-message: "&cAnticheat flagged your combat rotation."

recording:
  # Automatically create the dataset.csv header if the file does not exist.
  write-header-if-missing: true
  # Dataset path inside plugins/LumoAiDetector.
  dataset-path: "data/dataset.csv"
  # Maximum dataset rows (0 = unlimited). Warning printed at 80% of limit.
  max-dataset-rows: 100000

training:
  # Minimum rows required to start training.
  min-total-rows: 100
  # Minimum legit rows.
  min-legit-rows: 25
  # Minimum cheater rows.
  min-cheater-rows: 25
  # Percentage of the dataset held out for quick validation.
  validation-percent: 20
  # Random Forest trees. 100 is usually fast and stable.
  random-forest-trees: 100
  # 0 means sqrt(120). Can be set manually, e.g. 10 or 11.
  random-features: 0
  # Leaf limit per tree to keep the model from bloating.
  max-nodes: 100
  # Minimum leaf size.
  node-size: 5
  # RNG seed for reproducible training. 0 = random seed each run. Any other value
  # makes training deterministic for the same dataset and settings.
  seed: 0
  # Balance classes by weighting the minority class up during training. Helps when
  # legit and cheater row counts are very uneven. Set false for the old behavior.
  balance-classes: true
  # Upper bound for the automatic class weight, so a tiny minority class cannot
  # dominate the forest. 1.0 disables weighting in practice.
  class-weight-cap: 10.0
  # How often to broadcast training progress to admins.
  progress-interval-seconds: 5

models:
  # Automatically activate a new model after successful training.
  auto-activate-after-training: true
  # Model to load on startup if runtime.yml has not been created yet.
  active-model: ""
  # How many hours to keep deleted models in backups.
  backup-retention-hours: 72
  # Maximum number of temporary model backups.
  max-backups: 20

performance:
  # Auto-save interval for stats.yml.
  save-stats-interval-seconds: 60
  # Maximum player states in memory. Old offline states are cleaned up.
  max-player-states: 500
  # Run ML predictions off the main thread. Helps on servers with many players.
  async-prediction: false
  # Worker threads used when async-prediction is true. Predictions run on a
  # dedicated pool that is separate from the dataset writer, so heavy inference
  # never blocks dataset recording.
  prediction-threads: 1
